name: smartgenie-monorepo-ci-cd

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: smartgenie-monorepo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-automation-checks:
    name: Repository automation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install shared tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate automation helper syntax
        run: python -m compileall scripts

      - name: Run automation helper tests
        run: python -m pytest tests/test_update_gitops_tags.py -q

  quality-gates:
    name: Quality gates (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [agent-assistant, agent-analytics]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ../../requirements-dev.txt
          python -m pip install -r requirements.txt
          python -m pip install pip-audit bandit

      - name: Lint
        run: python -m ruff check .

      - name: Syntax validation
        run: python -m compileall .

      - name: Dependency vulnerability scan
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Static security scan
        run: python -m bandit -r . -x tests -ll

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: python -m pytest tests -q --junitxml=pytest.xml --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Quality Gate Summary'
            echo "- Service: ${{ matrix.service }}"
            echo '- Lint: completed'
            echo '- Syntax validation: completed'
            echo '- Dependency scan: completed'
            echo '- Static security scan: completed'
            echo '- Tests + coverage: completed'
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-validate:
    name: Docker validation (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [repo-automation-checks, quality-gates]
    strategy:
      fail-fast: false
      matrix:
        service: [agent-assistant, agent-analytics]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build validation image
        run: docker build -t smartgenie-${{ matrix.service }}:ci-${{ github.sha }} .

      - name: Install Trivy CLI
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy image vulnerability scan
        shell: bash
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed smartgenie-${{ matrix.service }}:ci-${{ github.sha }}

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo '## Docker Validation'
            echo "- Service: ${{ matrix.service }}"
            echo "- Validation image built for ${GITHUB_SHA}"
            echo '- Trivy image scan: completed'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-immutable-artifacts:
    name: Publish immutable images (${{ matrix.service }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [repo-automation-checks, quality-gates, docker-validate]
    strategy:
      fail-fast: false
      matrix:
        service: [agent-assistant, agent-analytics]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build immutable release image
        id: prep
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/smartgenie-${{ matrix.service }}"
          IMMUTABLE_TAG="sha-${SHORT_SHA}"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"
          docker build \
            -t "${IMAGE_BASE}:${IMMUTABLE_TAG}" \
            -t "${IMAGE_BASE}:dev-latest" \
            -t "${IMAGE_BASE}:main-${SHORT_SHA}" .

      - name: Install Trivy CLI
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy release scan
        shell: bash
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed "${{ steps.prep.outputs.image_base }}:${{ steps.prep.outputs.image_tag }}"

      - name: Push immutable and convenience tags
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker push "${{ steps.prep.outputs.image_base }}:${{ steps.prep.outputs.image_tag }}"
          docker push "${{ steps.prep.outputs.image_base }}:dev-latest"
          docker push "${{ steps.prep.outputs.image_base }}:main-${SHORT_SHA}"

      - name: Publish artifact summary
        shell: bash
        run: |
          {
            echo '## Published Artifact'
            echo "- Service: ${{ matrix.service }}"
            echo "- Immutable tag: ${{ steps.prep.outputs.image_tag }}"
            echo "- Registry: ${{ steps.prep.outputs.image_base }}"
          } >> "$GITHUB_STEP_SUMMARY"

  promote-dev-in-gitops:
    name: Promote immutable artifact to dev GitOps
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish-immutable-artifacts
    environment: dev

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Check GitOps token availability
        id: token_check
        shell: bash
        env:
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          if [ -z "$GITOPS_REPO_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GITOPS_REPO_TOKEN is not configured; skipping automatic dev promotion."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.token_check.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Checkout GitOps repo
        if: steps.token_check.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: SS12dev/sg-gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: sg-gitops

      - name: Update dev environment to immutable tag
        if: steps.token_check.outputs.available == 'true'
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          python scripts/update_gitops_tags.py \
            --gitops-dir sg-gitops \
            --environment dev \
            --tag "sha-${SHORT_SHA}"

      - name: Show GitOps diff
        if: steps.token_check.outputs.available == 'true'
        shell: bash
        run: |
          cd sg-gitops
          git diff -- environments/dev

      - name: Commit and push GitOps update
        if: steps.token_check.outputs.available == 'true'
        shell: bash
        run: |
          cd sg-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No GitOps changes detected."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          git add environments/dev
          git commit -m "Promote dev artifacts to sha-${SHORT_SHA}"
          git push origin HEAD:main
