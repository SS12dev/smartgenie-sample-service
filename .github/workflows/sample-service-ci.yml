name: sample-service-ci-cd

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'release/**'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to prepare a release image for'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - preprod
          - prod

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sample-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Syntax validation
        run: python -m compileall .

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: pytest tests -q --junitxml=pytest.xml --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Quality Gate Summary'
            echo '- Lint: completed'
            echo '- Syntax validation: completed'
            echo '- Tests + coverage: completed'
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-validate:
    name: Docker validation build
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build validation image
        run: docker build -t smartgenie-sample:ci-${{ github.sha }} .

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo '## Docker Validation'
            echo "- Validation image built for ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-dev-image:
    name: Publish dev image
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [quality-gates, docker-validate]
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/smartgenie-sample"
          docker build -t "${IMAGE_BASE}:dev-${GITHUB_SHA}" -t "${IMAGE_BASE}:dev-latest" .
          docker push "${IMAGE_BASE}:dev-${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:dev-latest"

  publish-qa-image:
    name: Publish qa image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [quality-gates, docker-validate]
    environment: qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push qa image
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/smartgenie-sample"
          docker build -t "${IMAGE_BASE}:${GITHUB_SHA}" -t "${IMAGE_BASE}:qa-latest" .
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:qa-latest"

  publish-preprod-image:
    name: Publish preprod image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    needs: [quality-gates, docker-validate]
    environment: preprod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preprod image
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/smartgenie-sample"
          docker build -t "${IMAGE_BASE}:preprod-${GITHUB_SHA}" -t "${IMAGE_BASE}:preprod-latest" .
          docker push "${IMAGE_BASE}:preprod-${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:preprod-latest"

  publish-manual-image:
    name: Publish manually selected environment image
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [quality-gates, docker-validate]
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push selected environment image
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/smartgenie-sample"
          TARGET_ENV="${{ inputs.target_environment }}"
          docker build -t "${IMAGE_BASE}:${TARGET_ENV}-${GITHUB_SHA}" -t "${IMAGE_BASE}:${TARGET_ENV}-latest" .
          docker push "${IMAGE_BASE}:${TARGET_ENV}-${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:${TARGET_ENV}-latest"
